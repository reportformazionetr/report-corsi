# Matching parameters
matching:
  auto_threshold: 95
  doubtful_threshold: 85

# Column headers mapping in excel files
columns:
  piano:
    ente: "Ente proponente"
    area: "Area"
    ambito: "Ambito"
    titolo: "Titolo"
    fonte: "Fonte di Finanziamento"
  report:
    titolo: "Corsi 2026"
    corso: "Corso"
    edizione: "Edizione"
    crediti: "CREDITI"
    docente: "Docente"
    ore_docente: "Ore Formazione"
    tipo_orario: "Tipo Orario"
    costo_servizio: "Costo Orario Servizio"
    costo_fuori_servizio: "Costo Orario Fuori Servizio"
    ore_svolte_edizione: "Ore Svolte Edizione"
  lea:
    titolo: "Titolo Corso"
    corso: "Codice Corso"
    iscritti: "Totale iscritti"
    effettivi: "Partecipanti Effettivi"
    crediti_ecm: "Con Crediti ECM"
    partecipante_id: "Codice Fiscale"

# Extra course costs configurations (such as ACLS)
additional_costs:
  - pattern: "ACLS"
    per_participant:
      costo_manuale: 55.00
      costo_segreteria: 20.00
    fixed: {}

# Manual title equivalences for extreme matching outliers (Piano Title -> List of equivalent titles in Report/LEA)
equivalences:
  "Formazione generale ai sensi del D.lgs. 81/08":
    - "CORSO SICUREZZA LAVORATORI “LA FORMAZIONE GENERALE DEI LAVORATORI” (ai sensi del D.lgs. 81/2008 s.m.i. e accordi attuativi)"
  "Esecutore BLSD (Basic Life Support Defibrillation)":
    - "BLSD  (Basic Life Support Defibrillation)"
  "Corso per addetto Antincendio livello III 2026":
    - "Antincendio Livello III + ESAME"
  "Formazione e addestramento Movimentazione Manuale Pazienti":
    - "Gestione del rischio da movimentazione manuale dei carichi e dei pazienti"
  "NUOVA GOVERNANCE CHIRURGICA: Focus prericovero e percorso preoperatorio":
    - "Nuova governance Chirurgica"
  "Esecutore ACLS (Advanced Cardiac Life Support (AHA)":
    - "ACLS"
  "Incontri multidisciplinari: Heart and aortic team audit clinico":
    - "INCONTRI MULTIDISCIPLINARI: HEART TEAM AUDIT CLINICO"
  "Laboratorio di simulazione urgenze intraospedaliere":
    - "Laboratorio Urgenze Intraospedaliere"
  "Prevenzione e cura in ottica di genere: Giornata nazionale per la prevenzione del melanoma. Melanoma cutaneo e medicina di genere: dal dato epidemiologico alla pratica clinica":
    - "Melanoma (risk management)"
  "Prevenzione e cura in ottica di genere: donazione di sangue in ottica di genere":
    - "Donazione sangue in ottica di genere (risk management)"
  "Elementi-principi di elettrocardiografia corso base ECG":
    - "Principi di elettrocardiografia  (ECG)"
